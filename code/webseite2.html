<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>School Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="School Logo" width="100" height="100">
    </div>

    <div class="top-right">
        <form class="login" action="login.html" method="post">
            <input type="text" name="username" placeholder="Kennung">
            <input type="password" name="password" placeholder="Passwort">
            <button type="submit">login für Schüler</button>
        </form>
        <form class="search" action="suche.html" method="get">
            <input type="text" name="search" placeholder="Suche etwas ...">
            <button type="submit">Suche</button>
        </form>
    </div>
</header>

<!--IMAGES  -->
<section class="subject-grid">
    <div class="history">
        <img src="books.png" alt="Geschichte" width="200" height="200">
        <h3>Geschichte</h3>
    </div>

    <div class="sprachen">
        <img src="globe.png" alt="Sprachen" width="193">
        <h3>Sprachen</h3>
    </div>

    <div class="natur">
        <img src="microscope.png" alt="Naturwissenschaften">
        <h3>Naturwissenschaften</h3>
    </div>

    <div class="mathe">
        <img src="calculator.png" alt="Mathematik" width="266" height="200">
        <h3>Mathematik</h3>
    </div>
</section>

<footer>
    <a href="impressum.html" class="impressum">Impressum</a>


</footer>

</body>
</html>
